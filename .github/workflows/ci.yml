name: CI user-management-service-versapath

on:
  pull_request:
    branches: [dev, staging, production]
  push:
    branches: [dev]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 and configure Maven auth for package registry
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
          # server-id must match the <id> of the <repository> entry in pom.xml
          server-id: github
          # Prefer an explicit PACKAGES_TOKEN / PACKAGES_USER (PAT) when provided
          # Fall back to the runner-provided token (github.token) and actor when the package
          # is hosted in the same organization/repository and GITHUB_TOKEN is sufficient.
          server-username: ${{ secrets.PACKAGES_USER || github.actor }}
          server-password: ${{ secrets.PACKAGES_TOKEN || github.token }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-
      - name: "Debug: show maven settings (passwords redacted)"
        run: |
          if [ -f ~/.m2/settings.xml ]; then
            sed -n '1,200p' ~/.m2/settings.xml | sed -e 's#<password>.*</password>#<password>***REDACTED***</password>#g'
          else
            echo "~/.m2/settings.xml not found"
          fi

      - name: Verify external package access
        run: mvn -B -DskipTests dependency:resolve

      - name: Build with Maven
        run: mvn -B clean install

      - name: Run tests
        run: mvn test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
