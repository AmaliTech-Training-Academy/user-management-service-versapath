name: CI - Java checks

on:
  pull_request:
    branches: [dev, staging, production]
  push:
    branches: [dev]

jobs:
  java-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set dynamic envs for configuring common_events dependency
        run: |
          echo "GITHUB_ACTOR=${{ secrets.COMMON_EVENTS_GH_USER }}" >> $GITHUB_ENV
          echo "GITHUB_TOKEN=${{ secrets.COMMON_EVENTS_GH_TOKEN }}" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Download Common events settings file
        run: |
          curl -o settings.xml https://raw.githubusercontent.com/AmaliTech-Training-Academy/config-repository-versapath/refs/heads/dev/settings.xml

      - run: cat settings.xml

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Verify dependencies
        run: |
          mvn -s settings.xml -B -DskipTests dependency:resolve

      - name: Build with Maven
        run: mvn -s settings.xml -B clean install

      - name: Run tests
        run: mvn -s settings.xml test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
